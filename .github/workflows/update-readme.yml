name: Update README
on:
  schedule:
    - cron: "0 22 * * *" # midnight SAST (UTC+2)
  workflow_dispatch:
jobs:
  build:
    name: Update this repo's README with recent activity and commits
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update recent commits section
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
        run: |
          set -x
          gh api -X GET "search/commits?q=author:natekettles&sort=author-date&order=desc&per_page=10" --jq '
            .items[]
            | "- [`\(.sha[0:7])`](\(.html_url)) \(.commit.message | split("\n")[0]) — [\(.repository.full_name)](https://github.com/\(.repository.full_name))"
          ' > commits.md.tmp

          echo "--- commits.md.tmp ---"
          cat commits.md.tmp
          echo "--- end ---"

          if [ ! -s commits.md.tmp ]; then
            echo "_No recent public commits yet._" > commits.md.tmp
          fi

          awk '
            /<!--START_SECTION:commits-->/ {
              print
              while ((getline line < "commits.md.tmp") > 0) print line
              skip=1
              next
            }
            /<!--END_SECTION:commits-->/ { skip=0 }
            !skip
          ' README.md > README.md.new
          mv README.md.new README.md
          rm commits.md.tmp

      - name: Update recent activity section
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          GH_USERNAME: natekettles
