name: Metrics
on:
  schedule:
    - cron: "30 22 * * *" # daily, 00:30 SAST
  workflow_dispatch:
  push:
    branches: [main]
    paths: [".github/workflows/metrics.yml"]

jobs:
  metrics:
    name: Generate profile metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Main metrics
        uses: lowlighter/metrics@v3.34
        with:
          filename: github-metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: natekettles
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Africa/Johannesburg
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, dockerfile, makefile, tex
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_lines: yes
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_followup: yes
          plugin_followup_sections: repositories, user
          plugin_stargazers: yes
          plugin_stargazers_charts_type: graph

      - name: Star lists
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.plugin.starlists.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: natekettles
          base: ""
          plugin_starlists: yes
          plugin_starlists_only: recommended
          plugin_starlists_limit: 1
          plugin_starlists_limit_repositories: 6
          plugin_starlists_languages: yes
          plugin_starlists_limit_languages: 8
